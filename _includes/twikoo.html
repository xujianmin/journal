<!-- Twikoo Comments -->
<!-- To enable Twikoo comments:
  1. Set twikoo_enabled: true in _config.yml
  2. Create a LeanCloud account at https://www.leancloud.app
  3. Get your envId from the LeanCloud dashboard
  4. Update the envId below with your AppID
-->
<script src="https://cdn.jsdelivr.net/npm/twikoo@1.6.31/dist/twikoo.all.min.js"></script>
<div id="twikoo-container" class="page-footer">
  <h2 class="page-footer-title">Comments</h2>
  <div id="twikoo"></div>
</div>
<script>
(function() {
  // Only initialize if envId is configured (not the placeholder)
  var envId = "{{ site.twikoo_envId | default: 'YOUR_ENV_ID' }}";
  if (envId && envId !== 'YOUR_ENV_ID' && envId !== '') {
    twikoo.init({
      envId: envId,
      el: "#twikoo",
      region: "{{ site.twikoo_region | default: 'ap-guangzhou' }}"
    });
  } else {
    document.getElementById('twikoo').innerHTML = '<p style="color: #666; font-style: italic;">Comments are not yet configured. Add your LeanCloud envId in _config.yml to enable them.</p>';
  }
})();
</script>

<style>
.page-footer {
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border-color, #dfe);
}
.page-footer-title {
  font-size: 1.5rem;
  margin-bottom: 1rem;
}
</style>
